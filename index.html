<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.875rem;
      opacity: 0.75;
      margin-top: 4px;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filters button {
      border: 1.5px solid #e5e7eb;
      background: white;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #6b7280;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .list li {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 12px;
      transition: background 0.15s;
    }

    .list li:hover { background: #fafafa; }

    .list li.checked .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    footer {
      padding: 14px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>쇼핑 리스트</h1>
      <p id="summary">0개 항목</p>
    </header>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <footer>
      <span id="footerInfo"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </footer>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(i =>
        filter === 'all' ? true : filter === 'done' ? i.done : !i.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">항목이 없습니다</li>';
      } else {
        list.innerHTML = filtered.map(item => `
          <li class="${item.done ? 'checked' : ''}" data-id="${item.id}">
            <input type="checkbox" ${item.done ? 'checked' : ''}
              onchange="toggle(${item.id})">
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" onclick="remove(${item.id})" title="삭제">✕</button>
          </li>
        `).join('');
      }

      const total = items.length;
      const done = items.filter(i => i.done).length;
      document.getElementById('summary').textContent =
        `${total}개 항목 · ${done}개 완료`;
      document.getElementById('footerInfo').textContent =
        `미완료 ${total - done}개`;
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      const count = items.filter(i => i.done).length;
      if (count === 0) return;
      if (confirm(`완료된 ${count}개 항목을 삭제할까요?`)) {
        items = items.filter(i => !i.done);
        save();
        render();
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
